name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags like v1.0.0

jobs:
  # ─────────────────────────────────────────────
  # Android build (APK)
  # ─────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create .env file
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: echo "$ENV_FILE" > .env

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/SajiloKhel.apk

  # ─────────────────────────────────────────────
  # iOS build (unsigned IPA)
  # ─────────────────────────────────────────────
  build-ios:
    name: Build iOS IPA (unsigned)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create .env file
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: echo "$ENV_FILE" > .env

      # Name: GOOGLE_SERVICES_INFO_PLIST, Value: content of ios/Runner/GoogleService-Info.plist
      - name: Create GoogleService-Info.plist
        env:
          GOOGLE_SERVICES_INFO_PLIST: ${{ secrets.GOOGLE_SERVICES_INFO_PLIST }}
        run: echo "$GOOGLE_SERVICES_INFO_PLIST" > ios/Runner/GoogleService-Info.plist

      - name: Get Dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r SajiloKhel.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/iphoneos/SajiloKhel.ipa

  # ─────────────────────────────────────────────
  # Create GitHub Release with both artifacts
  # ─────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk

      - name: Download IPA artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: SajiloKhel ${{ github.ref_name }}
          body: |
            ## SajiloKhel ${{ github.ref_name }}

            ### Downloads
            - **Android**: `SajiloKhel-${{ github.ref_name }}.apk`
            - **iOS**: `SajiloKhel-${{ github.ref_name }}.ipa` *(unsigned — sideload only)*
          files: |
            SajiloKhel.apk
            SajiloKhel.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
