name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags like v1.0.0

jobs:
  # ─────────────────────────────────────────────
  # Android build (AAB for Play Store & APK for GitHub)
  # ─────────────────────────────────────────────
  build-android:
    name: Build Android Artifacts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create .env file
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: echo "$ENV_FILE" > .env

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json

      # Decode the base64-encoded keystore
      - name: Set up release keystore
        env:
          KEYSTORE_BASE64:  ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS:        ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:     ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD:   ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/sajilokhel-release.jks
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=../sajilokhel-release.jks\n' \
            "$STORE_PASSWORD" "$KEY_PASSWORD" "$KEY_ALIAS" \
            > android/key.properties

      - name: Get Dependencies
        run: flutter pub get

      # Build the AAB (Required for Google Play Console)
      - name: Build AAB
        run: flutter build appbundle --release

      # Build the APK (Optional - useful for direct downloads from GitHub)
      - name: Build APK
        run: flutter build apk --release

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  # ─────────────────────────────────────────────
  # iOS build (unsigned IPA)
  # ─────────────────────────────────────────────
  build-ios:
    name: Build iOS IPA (unsigned)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create .env file
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: echo "$ENV_FILE" > .env

      - name: Create GoogleService-Info.plist
        env:
          GOOGLE_SERVICES_INFO_PLIST: ${{ secrets.GOOGLE_SERVICES_INFO_PLIST }}
        run: echo "$GOOGLE_SERVICES_INFO_PLIST" > ios/Runner/GoogleService-Info.plist

      - name: Get Dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r SajiloKhel.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/iphoneos/SajiloKhel.ipa

  # ─────────────────────────────────────────────
  # Create GitHub Release with all artifacts
  # ─────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]

    steps:
      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: android-aab
          path: .

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: .

      - name: Download IPA artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa
          path: .

      - name: Rename artifacts
        run: |
          mv app-release.aab SajiloKhel.aab
          mv app-release.apk SajiloKhel.apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: SajiloKhel ${{ github.ref_name }}
          body: |
            ## SajiloKhel ${{ github.ref_name }} Release

            ### Android
            - **Google Play**: Upload `SajiloKhel.aab` to the Console.
            - **Direct Install**: Download `SajiloKhel.apk`.

            ### iOS
            - **Sideload**: `SajiloKhel.ipa` *(unsigned)*.
          files: |
            SajiloKhel.aab
            SajiloKhel.apk
            SajiloKhel.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}